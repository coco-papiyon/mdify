name: Build and Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Download dependencies
      run: go mod download

    - name: Build binary for Windows
      run: GOOS=windows GOARCH=amd64 go build -o mdify.exe .

    - name: Create ZIP package
      run: zip mdify.zip mdify.exe install.bat uninstall.bat

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: mdify-package
        path: mdify.zip